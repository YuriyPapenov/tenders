* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(180deg, #f6f8fa 0%, #ffffff 200px); color: var(--text); line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 48px 24px; }

.card-date { font-size: 13px; color: var(--text-secondary); }
.card::before { content: "📄"; margin-right: 8px; font-size: 20px; }

.footer { margin-top: 60px; text-align: center; color: var(--text-secondary); font-size: 13px; }

@media (max-width: 600px) {
